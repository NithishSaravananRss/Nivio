name: nivio_desktop
description: "Nivio Desktop for Linux"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.12.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^16.0.0

  # Networking
  dio: ^5.9.0
  http: ^1.5.0

  # UI
  cached_network_image: ^3.4.1
  flutter_svg: ^2.2.1
  lucide_flutter: ^1.23.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
