name: nivio_desktop
description: "Nivio Desktop for Linux"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.12.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  app_links: ^7.2.1
  go_router: ^16.0.0

  # Networking
  dio: ^5.9.0
  flutter_dotenv: ^6.0.0
  http: ^1.5.0
  package_info_plus: ^10.2.0
  shorebird_code_push: ^2.0.7
  url_launcher: ^6.3.2
  wakelock_plus: ^1.2.8

  # Desktop playback
  file_picker: ^12.0.0-beta.7
  media_kit: ^1.2.6
  media_kit_video: ^2.0.1
  media_kit_libs_video: ^1.0.7
  webview_all: ^1.2.1
  webview_all_linux: ^1.2.1
  window_manager: ^0.5.1

  # Local persistence
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5
  shared_preferences: ^2.5.3
  supabase_flutter: ^2.10.3

  # UI
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1
  flutter_svg: ^2.2.1
  lucide_flutter: ^1.23.0
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # Assets
  assets:
    - .env
    - shorebird.yaml

  # Fonts
  # fonts:
